# Include this in the news.aasmo.in SSL VirtualHost before the React fallback.
# Required modules: proxy, proxy_http.

ProxyPreserveHost On
ProxyRequests Off

ProxyPass "/share/" "http://127.0.0.1:8004/api/v1/user/share/"
ProxyPassReverse "/share/" "http://127.0.0.1:8004/api/v1/user/share/"

ProxyPass "/uploads/" "http://127.0.0.1:8004/uploads/"
ProxyPassReverse "/uploads/" "http://127.0.0.1:8004/uploads/"
